name: Check Store Updates

on:
  schedule:
    - cron: '0 0 * * *' # Daily at UTC 00:00
  workflow_dispatch: # Allow manual trigger

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Read current config
      - name: Parse configuration
        id: config
        run: |
          if [ -f store-config.json ]; then
            CHROME_ID=$(jq -r '.chromeWebStoreId // empty' store-config.json)
            EDGE_ID=$(jq -r '.edgeAddonsId // empty' store-config.json)
            FIREFOX_ID=$(jq -r '.firefoxAmoId // empty' store-config.json)
            echo "chrome_web_store_id=$CHROME_ID" >> $GITHUB_OUTPUT
            echo "edge_addons_id=$EDGE_ID" >> $GITHUB_OUTPUT
            echo "firefox_amo_id=$FIREFOX_ID" >> $GITHUB_OUTPUT
          fi
          if [ -f version.json ]; then
            VERSION=$(jq -r '.version // empty' version.json)
            echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          fi

      # Download Chrome Web Store CRX and extract version
      - name: Fetch Chrome Web Store version
        id: chrome
        if: steps.config.outputs.chrome_web_store_id != ''
        run: |
          TEMP_FILE="temp-chrome.crx"
          curl -L -o "$TEMP_FILE" \
            "https://clients2.google.com/service/update2/crx?response=redirect&prodversion=100.0&acceptformat=crx2,crx3&x=id%3D${{ steps.config.outputs.chrome_web_store_id }}%26uc" \
            --fail --silent --show-error || true

          if [ -f "$TEMP_FILE" ] && [ -s "$TEMP_FILE" ]; then
            STORE_VERSION=$(unzip -p "$TEMP_FILE" manifest.json 2>/dev/null | jq -r '.version // empty' || true)
            if [ -n "$STORE_VERSION" ]; then
              mv "$TEMP_FILE" "browser-agent-${STORE_VERSION}-chrome.crx"
              echo "version=$STORE_VERSION" >> $GITHUB_OUTPUT
              echo "Chrome Web Store version: ${STORE_VERSION}"
            fi
          fi

      # Download Edge Add-ons CRX and extract version
      - name: Fetch Edge Add-ons version
        id: edge
        if: steps.config.outputs.edge_addons_id != ''
        run: |
          TEMP_FILE="temp-edge.crx"
          curl -L -o "$TEMP_FILE" \
            "https://edge.microsoft.com/extensionwebstorebase/v1/crx?response=redirect&x=id%3D${{ steps.config.outputs.edge_addons_id }}%26installsource%3Dondemand%26uc%26prodversion%3D32.0.0.0%26ping%3Dds%26acceptformat%3Dcrx2,prod" \
            --fail --silent --show-error || true

          if [ -f "$TEMP_FILE" ] && [ -s "$TEMP_FILE" ]; then
            STORE_VERSION=$(unzip -p "$TEMP_FILE" manifest.json 2>/dev/null | jq -r '.version // empty' || true)
            if [ -n "$STORE_VERSION" ]; then
              mv "$TEMP_FILE" "browser-agent-${STORE_VERSION}-edge.crx"
              echo "version=$STORE_VERSION" >> $GITHUB_OUTPUT
              echo "Edge Add-ons version: ${STORE_VERSION}"
            fi
          fi

      # Download Firefox AMO XPI and extract version
      - name: Fetch Firefox AMO version
        id: firefox
        if: steps.config.outputs.firefox_amo_id != ''
        run: |
          API_URL="https://addons.mozilla.org/api/v5/addons/addon/${{ steps.config.outputs.firefox_amo_id }}/"
          API_RESPONSE=$(curl -s "$API_URL")
          XPI_URL=$(echo "$API_RESPONSE" | jq -r '.current_version.files[0].url // empty')
          STORE_VERSION=$(echo "$API_RESPONSE" | jq -r '.current_version.version // empty')
          if [ -n "$XPI_URL" ]; then
            OUT_NAME="browser-agent-${STORE_VERSION:-unknown}-firefox.xpi"
            curl -L -o "$OUT_NAME" "$XPI_URL" --fail --silent --show-error || true
            echo "version=$STORE_VERSION" >> $GITHUB_OUTPUT
            echo "Firefox AMO version: ${STORE_VERSION}"
          fi

      # Check if any store version changed (untracked = just downloaded)
      - name: Detect version changes
        id: changes
        run: |
          CHANGED=false

          for f in browser-agent-*-chrome.crx browser-agent-*-edge.crx browser-agent-*-firefox.xpi; do
            [ -f "$f" ] || continue

            # Only process untracked (newly downloaded) files
            git ls-files --error-unmatch "$f" > /dev/null 2>&1 && continue

            NEW_VER=$(echo "$f" | grep -oP '\d+\.\d+\.\d+' | head -1)
            SUFFIX=$(echo "$f" | sed "s/browser-agent-[0-9.]*-/-/")
            OLD_FILE=$(git ls-files "browser-agent-*-${SUFFIX}" | head -1)

            if [ -n "$OLD_FILE" ] && [ "$OLD_FILE" != "$f" ]; then
              OLD_VER=$(echo "$OLD_FILE" | grep -oP '\d+\.\d+\.\d+' | head -1)
              if [ "$OLD_VER" != "$NEW_VER" ]; then
                echo "Updated: $OLD_FILE → $f"
                rm -f "$OLD_FILE"
                CHANGED=true
              else
                echo "Unchanged: $f ($NEW_VER), removing download"
                rm -f "$f"
              fi
            else
              echo "New artifact: $f"
              CHANGED=true
            fi
          done

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      # Build and deploy only if changes detected
      - name: Build and deploy
        if: steps.changes.outputs.changed == 'true'
        run: |
          # Update publishedAt timestamp
          if [ -f version.json ]; then
            CURRENT_VERSION=$(jq -r '.version' version.json)
            TARGETS=$(jq -c '.targets' version.json)
            cat > version.json <<EOF
          {"version":"$CURRENT_VERSION","targets":$TARGETS,"publishedAt":"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"}
          EOF
          fi

          node build.mjs

        # Commit updated artifacts
      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update store artifacts [skip ci]" || true
          git push

      - name: Deploy to Cloudflare
        if: steps.changes.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Skip (no changes)
        if: steps.changes.outputs.changed != 'true'
        run: echo "No store updates detected. Skipping deployment."
